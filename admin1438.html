<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="S&S Admin">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>S&S Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
*{scrollbar-width:none;-ms-overflow-style:none}
::-webkit-scrollbar{display:none}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;font-family:'DM Sans',system-ui,sans-serif;overscroll-behavior:none}
:root{
  --bg:#0a0a0a;--s1:#141414;--s2:#1c1c1c;--s3:#242424;
  --bdr:rgba(255,255,255,.08);--txt:#f0f0f0;--txt2:rgba(255,255,255,.45);--txt3:rgba(255,255,255,.2);
  --acc:#8b5cf6;--acc2:rgba(139,92,246,.15);--red:#ef4444;--grn:#22c55e;
}

/* ── GATE ── */
#gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px;gap:24px}
#gate-logo{font-size:22px;font-weight:700;letter-spacing:-.3px;color:var(--txt)}
#gate-logo span{color:var(--acc)}
#gate-sub{font-size:13px;color:var(--txt2)}
.gate-inp{width:100%;max-width:320px;background:var(--s1);border:1px solid var(--bdr);border-radius:14px;padding:15px 18px;color:var(--txt);font-size:16px;outline:none;text-align:center;letter-spacing:.15em}
.gate-inp:focus{border-color:var(--acc)}
.gate-btn{width:100%;max-width:320px;background:var(--acc);border:none;border-radius:14px;padding:15px;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
#gate-err{color:var(--red);font-size:13px;display:none}

/* ── SHELL ── */
#shell{display:none;flex-direction:column;height:100dvh}
.admin-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--s1);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:10}
.admin-hdr-title{font-weight:700;font-size:16px;flex:1}
.admin-hdr-badge{font-size:11px;background:var(--acc2);color:var(--acc);border-radius:6px;padding:3px 8px;font-weight:600}
.admin-logout{background:transparent;border:1px solid var(--bdr);border-radius:8px;padding:6px 12px;color:var(--txt2);font-size:12px;cursor:pointer}

/* ── TABS ── */
.tabs{display:flex;padding:0 16px;gap:4px;background:var(--s1);border-bottom:1px solid var(--bdr)}
.tab{flex:1;padding:12px 8px;font-size:13px;font-weight:600;color:var(--txt2);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ── CONTENT ── */
.panel-body{flex:1;overflow-y:auto;padding:20px 16px 40px}
.section-title{font-size:12px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}

/* ── CARDS ── */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px}
.card-hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bdr)}
.card-hdr-title{font-size:14px;font-weight:600;flex:1}
.card-body{padding:14px 16px;display:flex;flex-direction:column;gap:12px}

/* ── FORM ELEMENTS ── */
label{font-size:12px;font-weight:600;color:var(--txt2);display:block;margin-bottom:5px}
input[type=text],input[type=number],textarea,select{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:11px 13px;color:var(--txt);font-size:14px;outline:none;font-family:inherit}
input[type=text]:focus,textarea:focus,select:focus{border-color:var(--acc)}
textarea{resize:vertical;min-height:70px}
select option{background:#1c1c1c}

.upload-zone{background:var(--s2);border:1.5px dashed var(--bdr);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color .15s}
.upload-zone:hover{border-color:var(--acc)}
.upload-zone input{display:none}
.upload-zone-icon{font-size:28px;margin-bottom:8px}
.upload-zone-label{font-size:13px;color:var(--txt2)}

.btn-primary{background:var(--acc);border:none;border-radius:10px;padding:12px 20px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{background:var(--s2);border:1px solid var(--bdr);border-radius:8px;padding:7px 12px;color:var(--txt2);font-size:12px;cursor:pointer}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:7px 12px;color:var(--red);font-size:12px;cursor:pointer}

/* ── GRID ── */
.img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
.img-card{background:var(--s2);border-radius:12px;overflow:hidden;position:relative}
.img-card img,.img-card video{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.img-card-info{padding:10px 10px 8px}
.img-card-name{font-size:12px;color:var(--txt2);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-card-actions{display:flex;gap:6px}

/* ── TEMPLATE LIST ── */
.tmpl-admin{background:var(--s2);border-radius:12px;overflow:hidden;margin-bottom:10px;display:flex;align-items:center}
.tmpl-admin-img{width:64px;height:64px;object-fit:cover;flex-shrink:0}
.tmpl-admin-img-placeholder{width:64px;height:64px;background:var(--s3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.tmpl-admin-body{flex:1;padding:10px 12px;min-width:0}
.tmpl-admin-title{font-size:13px;font-weight:600;margin-bottom:2px}
.tmpl-admin-meta{font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmpl-admin-actions{padding:0 10px;display:flex;flex-direction:column;gap:5px}

/* ── BADGE / STATUS ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em}
.badge-vid{background:rgba(139,92,246,.2);color:#a78bfa}
.badge-img{background:rgba(34,197,94,.15);color:#4ade80}

/* ── MSG ── */
.msg{font-size:13px;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none}
.msg-ok{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.msg-err{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.msg-info{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}

.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:32px 20px;color:var(--txt3);font-size:13px}
hr{border:none;border-top:1px solid var(--bdr);margin:4px 0}
</style>
</head>
<body>

<!-- ── PIN GATE ── -->
<div id="gate">
  <div id="gate-logo">Subtle <span>&</span> Soul</div>
  <div id="gate-sub">Admin Panel</div>
  <input id="pin-inp" class="gate-inp" type="password" placeholder="Enter admin PIN" onkeydown="if(event.key==='Enter')adminLogin()">
  <div id="gate-err">Wrong PIN — try again</div>
  <button class="gate-btn" onclick="adminLogin()">Sign in</button>
</div>

<!-- ── ADMIN SHELL ── -->
<div id="shell">
  <div class="admin-hdr">
    <div class="admin-hdr-title">S&S Admin</div>
    <span class="admin-hdr-badge">ADMIN</span>
    <button class="admin-logout" onclick="adminLogout()">Sign out</button>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="switchTab(0,this)">Hero Slides</button>
    <button class="tab" onclick="switchTab(1,this)">Login BG</button>
    <button class="tab" onclick="switchTab(2,this)">Templates</button>
  </div>

  <!-- TAB 0: HERO SLIDES -->
  <div id="tab-0" class="panel-body">
    <div class="card">
      <div class="card-hdr"><div class="card-hdr-title">Upload Hero Slide</div></div>
      <div class="card-body">
        <div id="hero-msg" class="msg"></div>
        <div>
          <label>Image or Short Video</label>
          <div class="upload-zone" onclick="document.getElementById('hero-file').click()">
            <input type="file" id="hero-file" accept="image/*,video/mp4,video/webm,video/quicktime" onchange="previewHeroFile(this)">
            <div class="upload-zone-icon">🖼️</div>
            <div id="hero-file-name" class="upload-zone-label">Tap to choose file</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <label>Display Order</label>
            <input type="number" id="hero-order" value="0" min="0">
          </div>
        </div>
        <button class="btn-primary" id="hero-upload-btn" onclick="uploadHeroSlide()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Slide
        </button>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Current Slides (<span id="hero-count">0</span>)</div>
    <div id="hero-grid" class="img-grid"></div>
  </div>

  <!-- TAB 1: LOGIN BACKGROUND -->
  <div id="tab-1" class="panel-body" style="display:none">
    <div class="card">
      <div class="card-hdr"><div class="card-hdr-title">Upload Login Background</div></div>
      <div class="card-body">
        <div id="loginbg-msg" class="msg"></div>
        <div>
          <label>Image or Video (shown behind the login form)</label>
          <div class="upload-zone" onclick="document.getElementById('loginbg-file').click()">
            <input type="file" id="loginbg-file" accept="image/*,video/mp4,video/webm,video/quicktime" onchange="previewLoginFile(this)">
            <div class="upload-zone-icon">🎬</div>
            <div id="loginbg-file-name" class="upload-zone-label">Tap to choose image or video</div>
          </div>
        </div>
        <div>
          <label>Type</label>
          <select id="loginbg-type">
            <option value="image">Image</option>
            <option value="video">Video</option>
          </select>
        </div>
        <button class="btn-primary" id="loginbg-btn" onclick="uploadLoginBg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Set as Background
        </button>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Current Backgrounds</div>
    <div id="loginbg-list"></div>
  </div>

  <!-- TAB 2: TEMPLATES -->
  <div id="tab-2" class="panel-body" style="display:none">
    <div class="card">
      <div class="card-hdr"><div class="card-hdr-title">Add Template</div></div>
      <div class="card-body">
        <div id="tmpl-msg" class="msg"></div>
        <div>
          <label>Template Image <span style="color:var(--txt3)">(shown in the template card)</span></label>
          <div class="upload-zone" onclick="document.getElementById('tmpl-file').click()">
            <input type="file" id="tmpl-file" accept="image/*" onchange="previewTmplFile(this)">
            <div id="tmpl-file-preview" style="display:none;margin-bottom:8px"><img id="tmpl-img-prev" style="max-height:120px;border-radius:8px;object-fit:cover" alt=""></div>
            <div class="upload-zone-icon" id="tmpl-upload-icon">🎨</div>
            <div id="tmpl-file-name" class="upload-zone-label">Tap to choose image</div>
          </div>
        </div>
        <div>
          <label>Title</label>
          <input type="text" id="tmpl-title" placeholder="e.g. Cinematic Portrait">
        </div>
        <div>
          <label>Description <span style="color:var(--txt3)">(short subtitle)</span></label>
          <input type="text" id="tmpl-desc" placeholder="e.g. Studio lighting · 8K · Portrait">
        </div>
        <div>
          <label>Prompt <span style="color:var(--txt3)">(pre-filled when user taps template)</span></label>
          <textarea id="tmpl-prompt" placeholder="Hyper-realistic portrait, soft bokeh, studio lighting..."></textarea>
        </div>
        <div>
          <label>Target Feature</label>
          <select id="tmpl-screen">
            <option value="pimg">Prompt to Image</option>
            <option value="pvid">Prompt to Video</option>
            <option value="tts">Text to Speech</option>
            <option value="i2v">Image to Video</option>
            <option value="motion">Motion</option>
            <option value="refimg">Image to Image</option>
          </select>
        </div>
        <div>
          <label>Display Order</label>
          <input type="number" id="tmpl-order" value="0" min="0">
        </div>
        <button class="btn-primary" id="tmpl-btn" onclick="uploadTemplate()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Template
        </button>
      </div>
    </div>

    <div class="section-title" style="margin-top:20px">Templates (<span id="tmpl-count">0</span>)</div>
    <div id="tmpl-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SB_URL = 'https://qmwlphribvncdtgzbixt.supabase.co';
const SB_SRK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtd2xwaHJpYnZuY2R0Z3piaXh0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MDMwOTAyNywiZXhwIjoyMDk1ODg1MDI3fQ.x3rEPDI3MMBzbGdDa4O8R1k1-MspaopBqynnFP0hohU';
// ⬆ Change the PIN below — it's the only security gate for this admin panel
const ADMIN_PIN = 'subtle2026';

let sb;

// ── AUTH ──
function adminLogin() {
  const pin = document.getElementById('pin-inp').value.trim();
  const err = document.getElementById('gate-err');
  if (pin !== ADMIN_PIN) { err.style.display = 'block'; document.getElementById('pin-inp').value = ''; return; }
  err.style.display = 'none';
  sessionStorage.setItem('ss_admin', '1');
  document.getElementById('gate').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  document.getElementById('shell').style.flexDirection = 'column';
  initAdmin();
}

function adminLogout() {
  sessionStorage.removeItem('ss_admin');
  location.reload();
}

document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('ss_admin') === '1') {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('shell').style.display = 'flex';
    document.getElementById('shell').style.flexDirection = 'column';
    initAdmin();
  }
  document.getElementById('pin-inp').focus();
});

function initAdmin() {
  sb = window.supabase.createClient(SB_URL, SB_SRK);
  loadHeroSlides();
  loadLoginBgs();
  loadTemplates();
}

// ── TABS ──
function switchTab(idx, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  [0,1,2].forEach(i => document.getElementById('tab-'+i).style.display = i===idx ? 'block' : 'none');
}

// ── MSG ──
function showMsg(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'msg msg-' + type;
  el.textContent = text;
  el.style.display = 'block';
  if (type !== 'err') setTimeout(() => el.style.display = 'none', 4000);
}

// ── HERO SLIDES ──
let heroFile = null;
function previewHeroFile(inp) {
  heroFile = inp.files[0];
  if (heroFile) document.getElementById('hero-file-name').textContent = heroFile.name;
}

async function uploadHeroSlide() {
  if (!heroFile) { showMsg('hero-msg','err','Choose a file first'); return; }
  const btn = document.getElementById('hero-upload-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Uploading...';
  try {
    const ext = heroFile.name.split('.').pop();
    const path = 'hero/' + Date.now() + '.' + ext;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, heroFile, { contentType: heroFile.type });
    if (upErr) throw upErr;
    const { data } = sb.storage.from('avatars').getPublicUrl(path);
    const order = parseInt(document.getElementById('hero-order').value) || 0;
    const { error: dbErr } = await sb.from('hero_slides').insert({ url: data.publicUrl, display_order: order });
    if (dbErr) throw dbErr;
    showMsg('hero-msg', 'ok', '✓ Slide uploaded');
    document.getElementById('hero-file').value = '';
    document.getElementById('hero-file-name').textContent = 'Tap to choose file';
    heroFile = null;
    loadHeroSlides();
  } catch(e) { showMsg('hero-msg','err', e.message); }
  btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Upload Slide';
}

async function loadHeroSlides() {
  const { data } = await sb.from('hero_slides').select('*').order('display_order');
  document.getElementById('hero-count').textContent = data?.length || 0;
  const grid = document.getElementById('hero-grid');
  if (!data?.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No slides yet. Upload one above.</div>'; return; }
  grid.innerHTML = data.map(s => {
    const isVid = s.url.match(/\.(mp4|webm|mov)/i);
    return `<div class="img-card">
      ${isVid
        ? `<video src="${s.url}" muted autoplay loop playsinline style="width:100%;aspect-ratio:16/9;object-fit:cover"></video>`
        : `<img src="${s.url}" loading="lazy" alt="">`}
      <div class="img-card-info">
        <div class="img-card-name">Order: ${s.display_order}</div>
        <div class="img-card-actions">
          <button class="btn-danger" onclick="deleteHeroSlide('${s.id}','${s.url}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function deleteHeroSlide(id, url) {
  if (!confirm('Delete this slide?')) return;
  const path = url.split('/avatars/')[1]?.split('?')[0];
  if (path) await sb.storage.from('avatars').remove([path]);
  await sb.from('hero_slides').delete().eq('id', id);
  loadHeroSlides();
}

// ── LOGIN BACKGROUND ──
let loginBgFile = null;
function previewLoginFile(inp) {
  loginBgFile = inp.files[0];
  if (loginBgFile) {
    document.getElementById('loginbg-file-name').textContent = loginBgFile.name;
    const isVid = loginBgFile.type.startsWith('video');
    document.getElementById('loginbg-type').value = isVid ? 'video' : 'image';
  }
}

async function uploadLoginBg() {
  if (!loginBgFile) { showMsg('loginbg-msg','err','Choose a file first'); return; }
  const btn = document.getElementById('loginbg-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Uploading...';
  try {
    const ext = loginBgFile.name.split('.').pop();
    const path = 'login/' + Date.now() + '.' + ext;
    const { error: upErr } = await sb.storage.from('avatars').upload(path, loginBgFile, { contentType: loginBgFile.type });
    if (upErr) throw upErr;
    const { data } = sb.storage.from('avatars').getPublicUrl(path);
    const type = document.getElementById('loginbg-type').value;
    // Deactivate all others first
    await sb.from('login_background').update({ active: false }).neq('id', '00000000-0000-0000-0000-000000000000');
    const { error: dbErr } = await sb.from('login_background').insert({ url: data.publicUrl, type, active: true });
    if (dbErr) throw dbErr;
    showMsg('loginbg-msg','ok','✓ Background set');
    document.getElementById('loginbg-file').value = '';
    document.getElementById('loginbg-file-name').textContent = 'Tap to choose image or video';
    loginBgFile = null;
    loadLoginBgs();
  } catch(e) { showMsg('loginbg-msg','err', e.message); }
  btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Set as Background';
}

async function loadLoginBgs() {
  const { data } = await sb.from('login_background').select('*').order('created_at', { ascending: false });
  const list = document.getElementById('loginbg-list');
  if (!data?.length) { list.innerHTML = '<div class="empty">No background set yet.</div>'; return; }
  list.innerHTML = data.map(b => {
    const isVid = b.type === 'video';
    return `<div class="img-card" style="margin-bottom:10px">
      ${isVid
        ? `<video src="${b.url}" muted autoplay loop playsinline style="width:100%;max-height:180px;object-fit:cover"></video>`
        : `<img src="${b.url}" style="width:100%;max-height:180px;object-fit:cover" loading="lazy" alt="">`}
      <div class="img-card-info">
        <div class="img-card-name" style="display:flex;align-items:center;gap:8px">
          <span class="badge ${isVid ? 'badge-vid':'badge-img'}">${b.type}</span>
          ${b.active ? '<span style="font-size:11px;color:var(--grn)">● Active</span>' : '<span style="font-size:11px;color:var(--txt3)">Inactive</span>'}
        </div>
        <div class="img-card-actions" style="margin-top:6px">
          ${!b.active ? `<button class="btn-sm" onclick="activateBg('${b.id}')">Set Active</button>` : ''}
          <button class="btn-danger" onclick="deleteLoginBg('${b.id}','${b.url}')">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function activateBg(id) {
  await sb.from('login_background').update({ active: false }).neq('id', id);
  await sb.from('login_background').update({ active: true }).eq('id', id);
  loadLoginBgs();
}

async function deleteLoginBg(id, url) {
  if (!confirm('Delete this background?')) return;
  const path = url.split('/avatars/')[1]?.split('?')[0];
  if (path) await sb.storage.from('avatars').remove([path]);
  await sb.from('login_background').delete().eq('id', id);
  loadLoginBgs();
}

// ── TEMPLATES ──
let tmplFile = null;
function previewTmplFile(inp) {
  tmplFile = inp.files[0];
  if (!tmplFile) return;
  document.getElementById('tmpl-file-name').textContent = tmplFile.name;
  document.getElementById('tmpl-upload-icon').style.display = 'none';
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('tmpl-img-prev').src = e.target.result;
    document.getElementById('tmpl-file-preview').style.display = 'block';
  };
  reader.readAsDataURL(tmplFile);
}

async function uploadTemplate() {
  const title = document.getElementById('tmpl-title').value.trim();
  const prompt = document.getElementById('tmpl-prompt').value.trim();
  const screen = document.getElementById('tmpl-screen').value;
  if (!title) { showMsg('tmpl-msg','err','Add a title'); return; }
  if (!prompt) { showMsg('tmpl-msg','err','Add a prompt'); return; }
  const btn = document.getElementById('tmpl-btn');
  btn.disabled = true; btn.innerHTML = '<div class="spin"></div> Saving...';
  try {
    let imgUrl = null;
    if (tmplFile) {
      const ext = tmplFile.name.split('.').pop();
      const path = 'templates/' + Date.now() + '.' + ext;
      const { error: upErr } = await sb.storage.from('avatars').upload(path, tmplFile, { contentType: tmplFile.type });
      if (upErr) throw upErr;
      const { data } = sb.storage.from('avatars').getPublicUrl(path);
      imgUrl = data.publicUrl;
    }
    const { error: dbErr } = await sb.from('templates').insert({
      title,
      description: document.getElementById('tmpl-desc').value.trim() || null,
      image_url: imgUrl,
      prompt,
      target_screen: screen,
      display_order: parseInt(document.getElementById('tmpl-order').value) || 0,
      active: true
    });
    if (dbErr) throw dbErr;
    showMsg('tmpl-msg','ok','✓ Template added');
    // Reset form
    document.getElementById('tmpl-title').value = '';
    document.getElementById('tmpl-desc').value = '';
    document.getElementById('tmpl-prompt').value = '';
    document.getElementById('tmpl-order').value = '0';
    document.getElementById('tmpl-file').value = '';
    document.getElementById('tmpl-file-name').textContent = 'Tap to choose image';
    document.getElementById('tmpl-file-preview').style.display = 'none';
    document.getElementById('tmpl-upload-icon').style.display = 'block';
    tmplFile = null;
    loadTemplates();
  } catch(e) { showMsg('tmpl-msg','err', e.message); }
  btn.disabled = false; btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Template';
}

async function loadTemplates() {
  const { data } = await sb.from('templates').select('*').order('display_order');
  document.getElementById('tmpl-count').textContent = data?.length || 0;
  const list = document.getElementById('tmpl-list');
  if (!data?.length) { list.innerHTML = '<div class="empty">No templates yet.</div>'; return; }
  const screens = { pimg:'Prompt to Image', pvid:'Prompt to Video', tts:'Text to Speech', i2v:'Image to Video', motion:'Motion', refimg:'Image to Image' };
  list.innerHTML = data.map(t => `
    <div class="tmpl-admin">
      ${t.image_url
        ? `<img class="tmpl-admin-img" src="${t.image_url}" alt="">`
        : `<div class="tmpl-admin-img-placeholder">🎨</div>`}
      <div class="tmpl-admin-body">
        <div class="tmpl-admin-title">${t.title}</div>
        <div class="tmpl-admin-meta">${screens[t.target_screen] || t.target_screen} · ${t.prompt.slice(0,50)}...</div>
      </div>
      <div class="tmpl-admin-actions">
        <button class="btn-sm" onclick="toggleTemplate('${t.id}',${!t.active})">${t.active ? 'Hide' : 'Show'}</button>
        <button class="btn-danger" onclick="deleteTemplate('${t.id}','${t.image_url||''}')">Del</button>
      </div>
    </div>`).join('');
}

async function toggleTemplate(id, active) {
  await sb.from('templates').update({ active }).eq('id', id);
  loadTemplates();
}

async function deleteTemplate(id, url) {
  if (!confirm('Delete this template?')) return;
  if (url) {
    const path = url.split('/templates/')[1]?.split('?')[0];
    if (path) await sb.storage.from('avatars').remove([path]);
  }
  await sb.from('templates').delete().eq('id', id);
  loadTemplates();
}
</script>
